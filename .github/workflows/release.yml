name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'            # triggers for tags like v0.0.1

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build   # ensure package.json has a build script producing dist/sideways-calendar-card.js

      - name: Determine tag and release name
        id: tag
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "NAME=Release ${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - id: create_release
        name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: ${{ steps.tag.outputs.NAME }}
          body: |
            Release ${{ steps.tag.outputs.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload dist JS to release
        if: steps.create_release.outcome == 'success'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url || secrets.UPLOAD_URL }}
          asset_path: dist/sideways-calendar-card.js
          asset_name: sideways-calendar-card.js
          asset_content_type: application/javascript
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}